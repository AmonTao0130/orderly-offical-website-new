include:
  - project: 'orderlynetwork/orderly-devops/orderly-common/common-ci'
    ref: main
    file: '/common-orderly-network-dev-v2.yaml'

variables:
  SERVICE_NAME: official-website
  IMAGE_NAME: official-website


stages:
  - check_tag
  - build_docker
  - notify_slack
  - deploy

notify_slack:
  stage: notify_slack
  image:
    name: asia-northeast1-docker.pkg.dev/woo-orderly/orderly-devops/gcloud
    entrypoint: [""]
  script:
    - echo ${CI_COMMIT_TAG}
    - echo ${IMAGE_NAME}
    - TAG_EXISTS=$(gcloud container images list-tags asia-northeast1-docker.pkg.dev/woo-orderly/orderly-network/${IMAGE_NAME} --filter="tags=${CI_COMMIT_TAG}" --format="value(tags)")
    - echo ${TAG_EXISTS}
    - |
      if [ "${TAG_EXISTS}" ]; then
        echo "done, send slack message"

        USER_INFO=""
        if [ -n "${GITLAB_USER_NAME}" ]; then
          USER_INFO=" by ${GITLAB_USER_NAME}"
        elif [ -n "${CI_COMMIT_AUTHOR}" ]; then
          USER_INFO=" by ${CI_COMMIT_AUTHOR}"
        fi

        curl -X POST -H 'Content-type: application/json' --data "{\"text\":\"${IMAGE_NAME} tag: <${CI_PROJECT_URL}/-/tags/${CI_COMMIT_TAG}|${CI_COMMIT_TAG}> done, ${USER_INFO}\"}" ***REDACTED_SLACK_WEBHOOK***
      fi
  only:
    - tags
  tags:
    - dev
    - build